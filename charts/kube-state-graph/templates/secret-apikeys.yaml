{{- if and (not .Values.apiKeys.existingSecret) (gt (len .Values.apiKeys.keys) 0) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-state-graph.apiKeySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-state-graph.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.apiKeys.existingSecretKey }}: |
    # API keys provisioned by the kube-state-graph Helm chart.
    # One key per line. Lines starting with '#' are treated as comments.
    # The server re-reads this file every {{ .Values.apiKeys.reloadInterval | default "30s" }},
    # so rotating via `helm upgrade` propagates without a Pod restart
    # (kubelet Secret refresh ~60s).
{{- range .Values.apiKeys.keys }}
    {{ . }}
{{- end }}
{{- end }}
