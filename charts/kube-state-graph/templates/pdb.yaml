{{- if .Values.podDisruptionBudget.enabled -}}
{{- if and .Values.podDisruptionBudget.minAvailable .Values.podDisruptionBudget.maxUnavailable -}}
{{- fail "podDisruptionBudget: set EITHER minAvailable OR maxUnavailable, not both (Kubernetes PDB spec rejects setting both)." -}}
{{- end -}}
{{- if and (not .Values.podDisruptionBudget.minAvailable) (not .Values.podDisruptionBudget.maxUnavailable) -}}
{{- fail "podDisruptionBudget.enabled=true but neither minAvailable nor maxUnavailable is set." -}}
{{- end -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kube-state-graph.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-state-graph.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kube-state-graph.selectorLabels" . | nindent 6 }}
{{- end }}
