apiVersion: v2
name: kube-state-graph
description: |
  Multi-cluster pod / node / PVC graph API for Kubernetes. Reads
  kube-state-metrics and pod-UID-resolved service-graph metrics from a
  centralised VictoriaMetrics (or any Prometheus-compatible endpoint) and
  serves the joined cross-cluster graph as Cytoscape.js JSON or in the
  Grafana Node Graph datasource shape.
type: application
# Chart version is independent from the app version. Bump on every chart
# change; bump appVersion when the kube-state-graph binary version changes.
version: 0.1.0
appVersion: "dev"
kubeVersion: ">=1.24.0-0"
home: https://github.com/marz32one/kube-state-graph
sources:
  - https://github.com/marz32one/kube-state-graph
keywords:
  - kubernetes
  - observability
  - service-graph
  - kube-state-metrics
  - victoriametrics
  - prometheus
maintainers:
  - name: marz32one
    url: https://github.com/marz32one
