        may_cross_cluster:
          type: boolean
        source_type:
          items:
            $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_graph.NodeType'
          type: array
          uniqueItems: false
        target_type:
          items:
            $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_graph.NodeType'
          type: array
          uniqueItems: false
        type:
