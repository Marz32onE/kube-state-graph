    github_com_marz32one_kube-state-graph_pkg_cytoscape.Body:
      properties:
        apiVersion:
          type: string
        clusters:
          items:
            type: string
          type: array
          uniqueItems: false
        elements:
          $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_cytoscape.Elements'
      type: object
    github_com_marz32one_kube-state-graph_pkg_cytoscape.Edge:
      properties:
        data:
          $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_cytoscape.EdgeData'
      type: object
    github_com_marz32one_kube-state-graph_pkg_cytoscape.EdgeData:
      properties:
        id:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        source:
          type: string
        target:
          type: string
        type:
          type: string
      type: object
    github_com_marz32one_kube-state-graph_pkg_cytoscape.Elements:
      properties:
        edges:
          items:
            $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_cytoscape.Edge'
          type: array
          uniqueItems: false
        nodes:
          items:
            $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_cytoscape.Node'
          type: array
          uniqueItems: false
      type: object
    github_com_marz32one_kube-state-graph_pkg_cytoscape.Node:
      properties:
        data:
          $ref: '#/components/schemas/github_com_marz32one_kube-state-graph_pkg_cytoscape.NodeData'
      type: object
    github_com_marz32one_kube-state-graph_pkg_cytoscape.NodeData:
      properties:
        id:
          type: string
