version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - exhaustive
    # Modern Go idioms
    - copyloopvar
    - intrange
    - revive
    # Error handling
    - errorlint
    - nilerr
    # Security
    - gosec
    # Complexity
    - gocyclo
    - gocognit
    - funlen
    # Performance
    - prealloc
    - bodyclose
    - unconvert
    # Style
    - misspell
    # Dead code / duplication
    - dupl
    - unparam
    # Magic numbers
    - mnd
    # Testify usage
    - testifylint

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 100
      statements: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    testifylint:
      enable-all: true
    mnd:
      ignored-functions:
        - "context.WithTimeout"
        - "time.*"

  exclusions:
    paths:
      - openspec
      - .claude
      - .cursor
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - dupl
          - funlen
          - gocyclo
          - gocognit
          - mnd
          - revive
      - path: cmd/kube-state-graph/main\.go
        linters:
          - mnd
      - path: internal/config/
        linters:
          - mnd

formatters:
  enable:
    - gofmt
    - goimports
