      labels:
        items:
          $ref: '#/definitions/github_com_marz32one_kube-state-graph_internal_graph.EdgeTypeLabel'
        type: array
      may_cross_cluster:
        type: boolean
      source_type:
        items:
          $ref: '#/definitions/github_com_marz32one_kube-state-graph_internal_graph.NodeType'
