info:
    description: Multi-cluster pod / node / PVC graph API. Reads kube-state-metrics and pod-UID-resolved service-graph metrics from a centralised VictoriaMetrics and returns the joined cross-cluster graph as Cytoscape.js JSON or in the Grafana Node Graph datasource shape.
    license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0.html
    title: kube-state-graph API
    version: v1
openapi: 3.1.0
paths:
    /admin/cache:
        delete:
            responses:
                "204":
                    description: No Content
            summary: Flush in-process graph cache
            tags:
                - admin
    /debug/last-queries:
        get:
            responses:
                "501":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Not implemented in v1
            summary: 'Debug: last upstream queries'
            tags:
                - debug
    /docs:
        get:
            responses:
                "200":
                    content:
                        text/html:
                            schema:
                                type: string
                    description: HTML
            summary: API reference UI (Scalar)
            tags:
                - docs
    /docs/assets/{path}:
        get:
            parameters:
                - description: Asset path
                  in: path
                  name: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: string
                    description: static asset
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Not Found
            summary: API reference asset (vendored)
            tags:
                - docs
    /livez:
        get:
            responses:
                "200":
                    content:
                        text/plain:
                            schema:
                                type: string
                    description: ok
            summary: Liveness
            tags:
                - health
    /openapi.json:
        get:
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: string
                    description: OpenAPI 3.0 JSON
            summary: OpenAPI spec (JSON)
            tags:
                - docs
    /openapi.yaml:
        get:
            responses:
                "200":
                    content:
                        application/yaml:
                            schema:
                                type: string
                    description: OpenAPI 3.0 YAML
            summary: OpenAPI spec (YAML)
            tags:
                - docs
    /readyz:
        get:
            description: Returns 200 only when a 1 s `up{}` probe against the configured upstream succeeds.
            responses:
                "200":
                    content:
                        text/plain:
                            schema:
                                type: string
                    description: ok
                "503":
                    content:
                        text/plain:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Service Unavailable
            summary: Readiness
            tags:
                - health
    /v1/clusters:
        get:
            description: |-
                Returns the set of clusters observed in `kube_node_info` over the configured discovery lookback (default 1 h). Intersected with `--clusters-allowlist` when set. Result cached server-side for the discovery TTL; served with `Cache-Control: public, max-age=60` and a stable `ETag`.

                <details><summary><b>Sample response</b></summary>

                ```json
                {
                "apiVersion": "v1",
                "clusters": [
                { "name": "prod-eu" },
                { "name": "prod-us" },
                { "name": "stage-eu" }
                ]
                }
                ```

                </details>
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.clustersBody'
                    description: OK
                "502":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Upstream VictoriaMetrics unavailable
            summary: List clusters
            tags:
                - discovery
    /v1/edge-types:
        get:
            description: |-
                Static catalogue of edge types this server can produce — directionality, valid source/target node types, supported labels, and whether the edge may cross cluster boundaries. No upstream calls; served with `Cache-Control: public, max-age=3600` and a stable `ETag`. Use this to validate the `edge_type` filter on `/v1/graph` and to drive UI legends.

                <details><summary><b>Edge type matrix</b></summary>

                | type | source → target | directed | cross-cluster |
                |---|---|---|---|
                | `pod-runs-on-node` | pod → node | yes | no |
                | `pod-mounts-pvc` | pod → pvc | yes | no |
                | `pod-calls-pod` | pod → pod \| external | yes | yes |

                </details>
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.edgeTypesBody'
                    description: OK
            summary: Edge-type catalogue
            tags:
                - discovery
    /v1/graph:
        get:
            description: |-
                Returns the joined multi-cluster pod / node / PVC graph for the supplied `[start, end]` window in Cytoscape.js JSON shape (`{ elements: { nodes:[…], edges:[…] } }`).

                **Window**: `start`/`end` accept RFC 3339 or Unix seconds. Window is bucketed onto a 60 s grid (`start` floored, `end` ceiled). The cache key is time-only — all filter / traversal params are applied at response time over the cached graph and never fragment the cache.

                **Filters** (all repeatable; AND across param names, OR within a single name): `cluster`, `namespace`, `edge_type`, `pod`.

                **Traversal** (set `root` to enable): `depth` 0..6 (default 2), `direction` `in`/`out`/`both` (default `both`).

                **Caching**: response carries `ETag` + `Cache-Control` whose `max-age` follows the time class — live 30 s, recent 5 m, historical 1 h, frozen 24 h.

                Example: `GET /v1/graph?start=2026-05-05T11:00:00Z&end=2026-05-05T12:00:00Z&cluster=prod-eu&namespace=payments&edge_type=pod-calls-pod`

                <details><summary><b>Sample response</b></summary>

                ```json
                {
                "apiVersion": "v1",
                "start": "2026-05-05T11:00:00Z",
                "end":   "2026-05-05T12:00:00Z",
                "start_actual": "2026-05-05T11:00:00Z",
                "end_actual":   "2026-05-05T12:00:00Z",
                "bucket_seconds": 60,
                "built_at": "2026-05-05T12:00:01Z",
                "clusters": ["prod-eu", "prod-us"],
                "elements": {
                "nodes": [
                { "data": { "id": "prod-eu/8f8d4f1a-...-89ab", "type": "pod",  "name": "checkout-7d9f6c8b8-abcde", "labels": { "cluster": "prod-eu", "namespace": "payments" } } },
                { "data": { "id": "prod-eu/ip-10-0-1-23",     "type": "node", "name": "ip-10-0-1-23.ec2.internal", "labels": { "cluster": "prod-eu" } } }
                ],
                "edges": [
                { "data": { "id": "...uuidv5...", "type": "pod-runs-on-node", "source": "prod-eu/8f8d4f1a-...-89ab", "target": "prod-eu/ip-10-0-1-23", "labels": {} } },
                { "data": { "id": "...uuidv5...", "type": "pod-calls-pod",   "source": "prod-eu/8f8d4f1a-...-89ab", "target": "prod-us/a1b2c3d4-...-7654", "labels": { "cluster": "prod-eu" } } }
                ]
                }
                }
                ```

                </details>
            parameters:
                - description: Window start. RFC 3339 (`2026-05-05T11:00:00Z`) or Unix seconds (`1746442800`). Floored to the 60 s bucket grid.
                  in: query
                  name: start
                  required: true
                  schema:
                    example: "2026-05-05T11:00:00Z"
                    type: string
                - description: Window end. RFC 3339 or Unix seconds. Ceiled to the 60 s bucket grid; clamped to `floor(now, 60s)` if it would exceed now. Must be > start and within --max-window.
                  in: query
                  name: end
                  required: true
                  schema:
                    example: "2026-05-05T12:00:00Z"
                    type: string
                - description: Restrict to listed clusters (repeatable, OR-combined). Names match the upstream `cluster` label.
                  in: query
                  name: cluster
                  schema:
                    example:
                        - prod-eu
                        - prod-us
                    items:
                        example: prod-eu
                        type: string
                    type: array
                  style: form
                - description: Restrict to listed Kubernetes namespaces (repeatable, OR-combined).
                  in: query
                  name: namespace
                  schema:
                    example:
                        - payments
                        - checkout
                    items:
                        example: payments
                        type: string
                    type: array
                  style: form
                - description: Restrict to listed edge types. Repeatable, OR-combined.
                  in: query
                  name: edge_type
                  schema:
                    example:
                        - pod-calls-pod
                        - pod-runs-on-node
                    items:
                        enum:
                            - pod-runs-on-node
                            - pod-mounts-pvc
                            - pod-calls-pod
                        example: pod-calls-pod
                        type: string
                    type: array
                  style: form
                - description: Restrict to pods whose name matches exactly. Repeatable; multi-cluster name collisions return all matches.
                  in: query
                  name: pod
                  schema:
                    example:
                        - checkout-7d9f6c8b8-abcde
                        - payments-5c8b6f9d4-fghij
                    items:
                        example: checkout-7d9f6c8b8-abcde
                        type: string
                    type: array
                  style: form
                - description: Cluster-scoped node ID anchoring a traversal. Format depends on type — pods `<cluster>/<uid>`, nodes `<cluster>/<node>`, PVCs `<cluster>/<ns>/<claim>`, externals `external/<value>`.
                  in: query
                  name: root
                  schema:
                    example: prod-eu/8f8d4f1a-1234-4abc-9def-0123456789ab
                    type: string
                - description: BFS traversal depth in hops. Range `0..6`. Defaults to `2` when `root` is set, ignored otherwise.
                  in: query
                  name: depth
                  schema:
                    default: 2
                    example: 2
                    maximum: 6
                    minimum: 0
                    type: integer
                - description: Traversal direction relative to `root`. `out` = downstream edges, `in` = upstream edges, `both` = undirected. Defaults to `both`.
                  in: query
                  name: direction
                  schema:
                    default: both
                    enum:
                        - in
                        - out
                        - both
                    example: both
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.cytoscapeBody'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Invalid parameters (missing/invalid start|end, window_too_large, end_in_future, depth_too_large, invalid_scope)
                "503":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Capacity / timeout / cluster_too_large or upstream unavailable
            summary: Get multi-cluster graph (Cytoscape.js)
            tags:
                - graph
    /v1/graph/nodegraph:
        get:
            description: |-
                Same underlying graph as `/v1/graph` but projected into the parallel-array shape Grafana's Node Graph panel expects via the JSON / Infinity datasource: `nodes_fields[]`, `nodes[]`, `edges_fields[]`, `edges[]`.

                Filtering, traversal, bucketing, and caching semantics are identical to `/v1/graph` — see that endpoint for full details.

                Example: `GET /v1/graph/nodegraph?start=1746442800&end=1746446400&cluster=prod-eu&edge_type=pod-calls-pod&root=prod-eu/8f8d4f1a-1234-4abc-9def-0123456789ab&depth=3&direction=out`

                <details><summary><b>Sample response</b></summary>

                ```json
                {
                "apiVersion": "v1",
                "nodes_fields": [
                { "name": "id",    "type": "string" },
                { "name": "title", "type": "string" },
                { "name": "subtitle", "type": "string" }
                ],
                "nodes": [
                { "id": "prod-eu/8f8d4f1a-...-89ab", "title": "checkout-7d9f6c8b8-abcde", "subtitle": "pod" }
                ],
                "edges_fields": [
                { "name": "id",     "type": "string" },
                { "name": "source", "type": "string" },
                { "name": "target", "type": "string" }
                ],
                "edges": [
                { "id": "...uuidv5...", "source": "prod-eu/8f8d4f1a-...-89ab", "target": "prod-us/a1b2c3d4-...-7654" }
                ]
                }
                ```

                </details>
            parameters:
                - description: Window start. RFC 3339 or Unix seconds. Floored to the 60 s bucket grid.
                  in: query
                  name: start
                  required: true
                  schema:
                    example: "2026-05-05T11:00:00Z"
                    type: string
                - description: Window end. RFC 3339 or Unix seconds. Ceiled to the 60 s bucket grid; clamped to now.
                  in: query
                  name: end
                  required: true
                  schema:
                    example: "2026-05-05T12:00:00Z"
                    type: string
                - description: Restrict to listed clusters (repeatable, OR-combined).
                  in: query
                  name: cluster
                  schema:
                    example:
                        - prod-eu
                        - prod-us
                    items:
                        example: prod-eu
                        type: string
                    type: array
                  style: form
                - description: Restrict to listed namespaces (repeatable, OR-combined).
                  in: query
                  name: namespace
                  schema:
                    example:
                        - payments
                        - checkout
                    items:
                        example: payments
                        type: string
                    type: array
                  style: form
                - description: Restrict to listed edge types. Repeatable, OR-combined.
                  in: query
                  name: edge_type
                  schema:
                    example:
                        - pod-calls-pod
                        - pod-runs-on-node
                    items:
                        enum:
                            - pod-runs-on-node
                            - pod-mounts-pvc
                            - pod-calls-pod
                        example: pod-calls-pod
                        type: string
                    type: array
                  style: form
                - description: Restrict to pods whose name matches exactly. Repeatable.
                  in: query
                  name: pod
                  schema:
                    example:
                        - checkout-7d9f6c8b8-abcde
                        - payments-5c8b6f9d4-fghij
                    items:
                        example: checkout-7d9f6c8b8-abcde
                        type: string
                    type: array
                  style: form
                - description: Cluster-scoped node ID anchoring a traversal. See /v1/graph for ID formats per type.
                  in: query
                  name: root
                  schema:
                    example: prod-eu/8f8d4f1a-1234-4abc-9def-0123456789ab
                    type: string
                - description: BFS traversal depth `0..6`. Defaults to `2` when `root` is set.
                  in: query
                  name: depth
                  schema:
                    default: 2
                    example: 2
                    maximum: 6
                    minimum: 0
                    type: integer
                - description: Traversal direction. Defaults to `both`.
                  in: query
                  name: direction
                  schema:
                    default: both
                    enum:
                        - in
                        - out
                        - both
                    example: both
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.grafanaBody'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Invalid parameters
                "503":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_api.errorBody'
                    description: Capacity / timeout / upstream unavailable
            summary: Get multi-cluster graph (Grafana Node Graph datasource)
            tags:
                - graph
servers:
    - url: /
