host: localhost:8080
info:
  contact: {}
  description: Multi-cluster pod / node / PVC graph API. Reads kube-state-metrics
    and pod-UID-resolved service-graph metrics from a centralised VictoriaMetrics
    and returns the joined cross-cluster graph as Cytoscape.js JSON or in the Grafana
    Node Graph datasource shape.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: kube-state-graph API
  version: v1
paths:
  /admin/cache:
    delete:
      responses:
        "204":
          description: No Content
      summary: Flush in-process graph cache
      tags:
      - admin
  /debug/last-queries:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.debugLastQueriesBody'
      summary: 'Debug: last upstream queries'
      tags:
      - debug
  /docs:
    get:
      produces:
      - text/html
      responses:
        "200":
          description: HTML
          schema:
            type: string
      summary: API reference UI (Scalar)
      tags:
      - docs
  /docs/assets/{path}:
    get:
      parameters:
      - description: Asset path
        in: path
        name: path
        required: true
        type: string
      responses:
        "200":
          description: static asset
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorBody'
      summary: API reference asset (vendored)
      tags:
      - docs
  /livez:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Liveness
      tags:
      - health
  /openapi.json:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OpenAPI 3.0 JSON
          schema:
            type: string
      summary: OpenAPI spec (JSON)
      tags:
      - docs
  /openapi.yaml:
    get:
      produces:
      - application/yaml
      responses:
        "200":
          description: OpenAPI 3.0 YAML
          schema:
            type: string
      summary: OpenAPI spec (YAML)
      tags:
      - docs
  /readyz:
    get:
      description: Returns 200 only when a 1 s `up{}` probe against the configured
        upstream succeeds.
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_api.errorBody'
      summary: Readiness
      tags:
      - health
  /v1/clusters:
    get:
      description: Returns the set of clusters observed in `kube_node_info` over the
        configured discovery lookback (default 1 h). Intersected with --clusters-allowlist
        when set.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.clustersBody'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_api.errorBody'
      summary: List clusters
      tags:
      - discovery
  /v1/edge-types:
    get:
      description: Static catalogue of edge types this server can produce. No upstream
        calls. Long-lived Cache-Control + ETag.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.edgeTypesBody'
      summary: Edge-type catalogue
      tags:
      - discovery
  /v1/graph:
    get:
      description: Returns the multi-cluster pod / node / PVC graph for the supplied
        [start, end] window in Cytoscape.js shape. Filter via cluster/namespace/node/edge_type;
        traverse via root/depth/direction.
      parameters:
      - description: RFC 3339 or Unix-seconds timestamp
        in: query
        name: start
        required: true
        type: string
      - description: RFC 3339 or Unix-seconds timestamp
        in: query
        name: end
        required: true
        type: string
      - collectionFormat: multi
        description: Restrict to listed clusters
        in: query
        items:
          type: string
        name: cluster
        type: array
      - collectionFormat: multi
        description: Restrict to listed namespaces
        in: query
        items:
          type: string
        name: namespace
        type: array
      - collectionFormat: multi
        description: Restrict to listed K8s node names
        in: query
        items:
          type: string
        name: node
        type: array
      - collectionFormat: multi
        description: Restrict to listed edge types
        in: query
        items:
          type: string
        name: edge_type
        type: array
      - description: Cluster-scoped node ID anchoring a traversal
        in: query
        name: root
        type: string
      - description: Traversal depth (0..6, default 2 when root is set)
        in: query
        name: depth
        type: integer
      - description: Traversal direction
        enum:
        - in
        - out
        - both
        in: query
        name: direction
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.cytoscapeBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorBody'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_api.errorBody'
      summary: Get multi-cluster graph (Cytoscape.js)
      tags:
      - graph
  /v1/graph/nodegraph:
    get:
      description: Same data as /v1/graph but projected into the parallel-array shape
        Grafana's Node Graph panel expects when consumed via the JSON / Infinity datasource.
      parameters:
      - description: RFC 3339 or Unix-seconds timestamp
        in: query
        name: start
        required: true
        type: string
      - description: RFC 3339 or Unix-seconds timestamp
        in: query
        name: end
        required: true
        type: string
      - collectionFormat: multi
        description: Restrict to listed clusters
        in: query
        items:
          type: string
        name: cluster
        type: array
      - collectionFormat: multi
        description: Restrict to listed namespaces
        in: query
        items:
          type: string
        name: namespace
        type: array
      - collectionFormat: multi
        description: Restrict to listed K8s node names
        in: query
        items:
          type: string
        name: node
        type: array
      - collectionFormat: multi
        description: Restrict to listed edge types
        in: query
        items:
          type: string
        name: edge_type
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.grafanaBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorBody'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_api.errorBody'
      summary: Get multi-cluster graph (Grafana Node Graph datasource)
      tags:
      - graph
swagger: "2.0"
