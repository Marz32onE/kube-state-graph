---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: kube-state-graph
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: kube-state-graph
        type: yesoreyeram-infinity-datasource
        access: proxy
        url: http://kube-state-graph.kube-state-graph.svc:8080
        isDefault: true
        jsonData:
          global_queries: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: kube-state-graph
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: kube-state-graph
        orgId: 1
        folder: kube-state-graph
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nodegraph
  namespace: kube-state-graph
  # Loaded from deploy/grafana/kube-state-graph-nodegraph.json by bootstrap.sh.
data: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kube-state-graph
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_INSTALL_PLUGINS
              value: yesoreyeram-infinity-datasource
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboard-nodegraph
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: kube-state-graph
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
