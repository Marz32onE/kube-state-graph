---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: kube-state-graph
  labels:
    app: victoria-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.107.0
          args:
            - "-storageDataPath=/var/lib/victoria-metrics-data"
            - "-retentionPeriod=30d"
            - "-promscrape.config=/etc/vmagent/scrape.yaml"
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: storage
              mountPath: /var/lib/victoria-metrics-data
            - name: scrape-config
              mountPath: /etc/vmagent
      volumes:
        - name: storage
          emptyDir: {}
        - name: scrape-config
          configMap:
            name: vm-scrape-config
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: kube-state-graph
spec:
  selector:
    app: victoria-metrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      nodePort: 30428
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-scrape-config
  namespace: kube-state-graph
data:
  scrape.yaml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      # kube-state-metrics scrapes the kind cluster directly. The `cluster`
      # label is injected here via relabel because kube-state-metrics emits no
      # cluster identity by default; kube-state-graph requires every series to
      # carry one (graph-api spec § "Cluster-scoped IDs"). This single-cluster
      # local rig stands in for what a real central VictoriaMetrics would
      # build by vmagent remote_write with `external_labels` per source
      # cluster. Service-graph series (traces_service_graph_request_total)
      # are not emitted in the local rig — covered by integration tests in
      # internal/integration/ via VM container ingest.
      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics.kube-state-graph.svc:8080
        relabel_configs:
          - target_label: cluster
            replacement: kind-local
