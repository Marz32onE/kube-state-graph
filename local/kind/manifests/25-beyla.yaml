---
# Beyla auto-instrumentation DaemonSet. Attaches eBPF probes to every pod in
# the kube-state-graph namespace and exports OTLP traces to the Alloy
# Deployment (manifest 27-alloy.yaml) on :4317. Beyla decorates spans with
# the local pod's `k8s.pod.uid` resource attribute; the Alloy servicegraph
# connector promotes that attribute to client_k8s_pod_uid / server_k8s_pod_uid
# on the resulting traces_service_graph_request_total metric — which is the
# exact label schema kube-state-graph expects (see internal/build/servicegraph.go).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beyla
  namespace: kube-state-graph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: beyla
rules:
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services", "nodes"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: beyla
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: beyla
subjects:
  - kind: ServiceAccount
    name: beyla
    namespace: kube-state-graph
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beyla-config
  namespace: kube-state-graph
data:
  beyla-config.yml: |
    # Enable Kubernetes metadata so spans carry resource attributes including
    # k8s.pod.uid, k8s.namespace.name, k8s.deployment.name. The servicegraph
    # connector reads k8s.pod.uid per span kind to derive UID labels.
    attributes:
      kubernetes:
        enable: true
    # Collapse high-cardinality URL paths.
    routes:
      unmatched: heuristic
    # Instrument every workload in the kube-state-graph namespace. The traffic
    # generator (curl loop) and the two httpd services exchange requests so
    # there is always paired client+server span data.
    discovery:
      instrument:
        - k8s_namespace: kube-state-graph
    # OTLP traces export to the Alloy receiver. gRPC :4317 is the default;
    # the protocol is set explicitly so this stays correct if Beyla changes
    # its default.
    otel_traces_export:
      endpoint: http://alloy.kube-state-graph.svc:4317
      protocol: grpc
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
  namespace: kube-state-graph
  labels:
    app: beyla
spec:
  selector:
    matchLabels:
      app: beyla
  template:
    metadata:
      labels:
        app: beyla
    spec:
      serviceAccountName: beyla
      hostPID: true
      containers:
        - name: beyla
          image: grafana/beyla:3.13.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          env:
            - name: BEYLA_CONFIG_PATH
              value: /config/beyla-config.yml
          volumeMounts:
            - name: beyla-config
              mountPath: /config
            - name: var-run-beyla
              mountPath: /var/run/beyla
      volumes:
        - name: beyla-config
          configMap:
            name: beyla-config
        - name: var-run-beyla
          emptyDir: {}
