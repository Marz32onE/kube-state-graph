---
# kube-state-metrics scoped down to the metrics kube-state-graph actually
# consumes from a real cluster: pod-info, node-info, and node-labels.
# Other resources/metrics are disabled to keep the local rig small. The
# `cluster` label is injected by the VM scrape relabel rule (see
# 10-victoria-metrics.yaml — "kube-state-metrics" job).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: kube-state-graph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: kube-state-graph
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: kube-state-graph
  labels:
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            - "--resources=pods,nodes,persistentvolumeclaims"
            - "--metric-allowlist=kube_pod_info,kube_node_info,kube_node_labels,kube_pod_spec_volumes_persistentvolumeclaims_info"
            # Surface every node label as a metric label so the topology reader
            # sees them. Without this the kube_node_labels series only carries
            # whatever is on the node-info join.
            - "--metric-labels-allowlist=nodes=[*]"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: telemetry
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: kube-state-graph
spec:
  selector:
    app: kube-state-metrics
  ports:
    - name: http
      port: 8080
      targetPort: 8080
