---
# PVC + pod demo: exercises pod-mounts-pvc edges + PVCNode in the
# /v1/graph response. Storage class `standard` is the kind default
# (rancher.io/local-path). Two PVCs verify multi-claim handling.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-data
  namespace: kube-state-graph
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 64Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-cache
  namespace: kube-state-graph
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-demo
  namespace: kube-state-graph
  labels:
    app: pvc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvc-demo
  template:
    metadata:
      labels:
        app: pvc-demo
    spec:
      containers:
        - name: writer
          image: busybox:1.36
          command:
            - sh
            - -c
            - "while true; do date >> /data/log; date >> /cache/log; sleep 30; done"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: cache
              mountPath: /cache
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-data
        - name: cache
          persistentVolumeClaim:
            claimName: demo-cache
