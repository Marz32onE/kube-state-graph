---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-graph
  namespace: kube-state-graph
  labels:
    app: kube-state-graph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-graph
  template:
    metadata:
      labels:
        app: kube-state-graph
    spec:
      containers:
        - name: server
          image: localhost/kube-state-graph/server:dev
          imagePullPolicy: Never
          env:
            - name: KSG_PROM_URL
              value: "http://victoria-metrics.kube-state-graph.svc:8428"
            - name: KSG_LISTEN_ADDR
              value: ":8080"
            - name: KSG_EXTERNAL_NAME_PATTERN
              value: "://"
            - name: KSG_LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-graph
  namespace: kube-state-graph
spec:
  selector:
    app: kube-state-graph
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
