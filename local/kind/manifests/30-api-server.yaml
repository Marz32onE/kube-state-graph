---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-graph
  namespace: kube-state-graph
  labels:
    app: kube-state-graph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-graph
  template:
    metadata:
      labels:
        app: kube-state-graph
    spec:
      volumes:
        - name: api-keys
          secret:
            secretName: kube-state-graph-api-keys
            defaultMode: 0o444
      containers:
        - name: server
          image: localhost/kube-state-graph/server:dev
          imagePullPolicy: Never
          env:
            - name: KSG_PROM_URL
              value: "http://victoria-metrics.kube-state-graph.svc:8428"
            - name: KSG_LISTEN_ADDR
              value: ":8080"
            - name: KSG_OTHERS_NAME_PATTERN
              value: "://"
            - name: KSG_API_KEYS_FILE
              value: "/etc/kube-state-graph/api-keys/keys"
            - name: KSG_API_KEYS_RELOAD_INTERVAL
              value: "30s"
            - name: KSG_LOG_LEVEL
              value: "info"
            # OpenTelemetry exporter — point at the in-cluster Alloy.
            # Alloy fans traces to Tempo (for Grafana Explore) and through the
            # servicegraph connector to VictoriaMetrics. Logs land in Alloy's
            # stdout via the debug exporter. Comment these out to disable
            # OTLP exports (Init falls back to no-op providers).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.kube-state-graph.svc:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "kube-state-graph"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=kind-local,cluster=kind-local"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
          volumeMounts:
            - name: api-keys
              mountPath: /etc/kube-state-graph/api-keys
              readOnly: true
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-graph
  namespace: kube-state-graph
spec:
  selector:
    app: kube-state-graph
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
