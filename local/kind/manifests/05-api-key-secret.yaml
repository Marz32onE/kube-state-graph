---
# Local-only API key secret for the kind rig. ROTATE / REPLACE before any
# real deployment — do not reuse these literals outside development.
#
# The mounted file at /etc/kube-state-graph/api-keys/keys is consumed by the
# server when started with --api-keys-file=/etc/kube-state-graph/api-keys/keys.
# One key per line; lines starting with '#' are comments. The server re-reads
# the file every --api-keys-reload-interval (default 30 s), so editing this
# Secret + `kubectl rollout restart` is NOT required for rotation: a simple
# `kubectl apply -f 05-api-key-secret.yaml` suffices once kubelet propagates
# the new content (~60 s).
apiVersion: v1
kind: Secret
metadata:
  name: kube-state-graph-api-keys
  namespace: kube-state-graph
  labels:
    app: kube-state-graph
type: Opaque
stringData:
  keys: |
    # Local dev keys for the kind rig. NOT for production.
    dev-key-rotate-me-please
    smoke-test-key
