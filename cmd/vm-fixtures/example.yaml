# Multi-cluster integration test fixtures.
# Two synthetic clusters; one cross-cluster RPC; one external endpoint.

pods:
  - cluster: cluster-alpha
    namespace: shop
    pod: checkout-7c9d
    uid: alpha-pod-1
    node: worker-0
  - cluster: cluster-alpha
    namespace: shop
    pod: cart-5b8a
    uid: alpha-pod-2
    node: worker-0
  - cluster: cluster-beta
    namespace: billing
    pod: payments-9e44
    uid: beta-pod-1
    node: worker-0

nodes:
  - cluster: cluster-alpha
    node: worker-0
    external_ip: 203.0.113.10
    labels:
      topology.kubernetes.io/zone: us-east-1a
      kubernetes.io/arch: amd64
  - cluster: cluster-beta
    node: worker-0
    external_ip: 198.51.100.10
    labels:
      topology.kubernetes.io/zone: eu-west-1a
      kubernetes.io/arch: amd64

pvcs:
  - cluster: cluster-alpha
    namespace: shop
    pod: checkout-7c9d
    volume: data
    claim_name: checkout-data

calls:
  - client: checkout
    server: cart
    client_cluster: cluster-alpha
    server_cluster: cluster-alpha
    client_k8s_pod_uid: alpha-pod-1
    server_k8s_pod_uid: alpha-pod-2
    client_k8s_namespace_name: shop
    server_k8s_namespace_name: shop
    connection_type: virtual_node
    rate: 5
  - client: checkout
    server: payments
    client_cluster: cluster-alpha
    server_cluster: cluster-beta
    client_k8s_pod_uid: alpha-pod-1
    server_k8s_pod_uid: beta-pod-1
    client_k8s_namespace_name: shop
    server_k8s_namespace_name: billing
    connection_type: virtual_node
    rate: 2
  - client: checkout
    server: https://payments.partner.example/api
    client_cluster: cluster-alpha
    server_cluster: ""
    client_k8s_pod_uid: alpha-pod-1
    server_k8s_pod_uid: ""
    client_k8s_namespace_name: shop
    server_k8s_namespace_name: ""
    connection_type: virtual_node
    rate: 1
