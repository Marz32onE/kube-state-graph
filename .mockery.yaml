# Mockery v2 config — community standard layout.
#
# Mocks are committed to git so CI does not need mockery installed.
# Regenerate with `make mocks`. CI verifies freshness with `make verify-mocks`.
#
# Mockery is tracked via the `tool` directive in go.mod (Go 1.24+) and
# invoked as `go tool mockery`, so the version is repo-pinned without
# polluting the production binary.

with-expecter: true
filename: "mock_{{.InterfaceName | snakecase}}.go"
mockname: "Mock{{.InterfaceName}}"
outpkg: "mocks"
dir: "{{.InterfaceDir}}/mocks"
disable-version-string: true
resolve-type-alias: false
issue-845-fix: true

packages:
  github.com/marz32one/kube-state-graph/pkg/promql:
    interfaces:
      Querier:
  github.com/marz32one/kube-state-graph/internal/auth:
    interfaces:
      Validator:
  github.com/marz32one/kube-state-graph/pkg/clock:
    interfaces:
      Clock:
